name: densenet-train-dq-bc-64-12
desc: DQ training for DenseNet-BC (L=64, k=12) on CIFAR-10

cmd: >
  python3 experiment_dq.py \
    --model densenet_bc_64_12 \
    --checkpoint models/cifar10_densenet_bc_64_12.pt \
    --bitwidth-target 3 --bitwidth-lambda 0.01 \
    --device cuda \
    --name densenet_bc_64_12_dq_t3_l01

inputs:
  - experiment_dq.py
  - densenet_quant.py
  - dq_quantizer.py
  - data_utils.py
  - models/cifar10_densenet_bc_64_12.pt

outputs:
  - models/
  - results/

env:
  python:
    type: manual
    version: 3.12.2
    pip:
      index-url: https://download.pytorch.org/whl/cu118
      extra-index-urls:
        - https://pypi.org/simple
      trusted-hosts:
        - pytorch.org
        - pypi.org

    requirements-file: infra/requirements.txt
    root-path:
      - experiment_dq.py
    local-paths:
      - densenet_quant.py
      - dq_quantizer.py
      - data_utils.py

flags:
  - attach-project-disk

cloud-instance-types:
  - g2.1 # A100

graceful-shutdown:
  signal: SIGTERM
  timeout: 15s
